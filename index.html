<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Discipline Pro</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#141E30,#243B55);
color:white;
text-align:center;
}

header{
padding:20px;
font-size:30px;
font-weight:bold;
}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
margin:20px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

button{
background:#00ff9c;
border:none;
padding:12px 20px;
border-radius:10px;
font-weight:bold;
}

</style>

</head>

<body>

<header>🔥 Discipline Pro</header>

<div class="card">
<h2>Program Azi</h2>
<p>16:30 – Teme</p>
<p>17:30 – Sală / Alergare</p>
<p>19:30 – Relax</p>
<p>22:30 – Somn</p>
</div>

<div class="card">
<h2>💧 Apă</h2>
<p id="water">0 / 8 pahare</p>
<button onclick="drink()">Am băut apă</button>
</div>

<div class="card">
<h2>🏋️ Sală</h2>
<p>Luni – Piept</p>
<p>Miercuri – Spate</p>
<p>Vineri – Picioare</p>
</div>

<script>

let water=0

function drink(){
water++
document.getElementById("water").innerText=water+" / 8 pahare"
}

</script>

</body>
</html>
